<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="A simple, mobile-first compass web app to point you to the nearest available Dublin Bikes station in real-time.">
    <title>dbcompass - Dublin Bikes</title>
    <link rel="stylesheet" href="style.css">
    <link rel="apple-touch-icon" href="https://via.placeholder.com/192/000000/FFFFFF?text=db">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div id="app">
        <header>
            <h1>dbcompass</h1>
            <p id="status-text">Locating nearest station...</p>
        </header>

        <main>
            <div id="compass-container">
                <div id="compass-needle"></div>
                <div id="distance-display">--m</div>
            </div>

            <div id="station-info">
                <h2 id="station-name"></h2>
                <div class="stats">
                    <div class="stat">
                        <span class="label">Bikes</span>
                        <span id="bikes-count" class="value">00</span>
                    </div>
                    <div class="stat">
                        <span class="label">Stands</span>
                        <span id="stands-count" class="value">00</span>
                    </div>
                </div>
            </div>
        </main>

        <div id="permission-overlay">
            <div class="modal">
                <h2>Welcome</h2>
                <p>To guide you to the closest available bike, please allow access to your device's location and compass.</p>
                <button id="start-btn">Find Nearest Bike</button>
            </div>
        </div>

        <footer>
            <p>Real-time data from JCDecaux</p>
            <p id="deploy-time" class="timestamp"></p>
        </footer>
    </div>
    
    <script>
        // Injected during deployment
        window.DB_API_KEY = '4cb16cc25629379a9b853bdd1c55e7b86a203839';
        window.DEPLOY_TIME = '2026-03-12 18:35 UTC';

        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js').catch(err => {
                    console.log('ServiceWorker registration failed: ', err);
                });
            });
        }
    </script>
    <script type="module" src="src/app.js"></script>
</body>
</html>
