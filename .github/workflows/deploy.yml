name: Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current time
        id: time
        run: echo "deploy_time=$(date -u +'%Y-%m-%d %H:%M UTC')" >> $GITHUB_OUTPUT

      - name: Inject Secrets into index.html
        run: |
          sed -i "s/INJECT_API_KEY/${{ secrets.DB_API_KEY }}/g" index.html
          sed -i "s/INJECT_DEPLOY_TIME/${{ steps.time.outputs.deploy_time }}/g" index.html

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: .
